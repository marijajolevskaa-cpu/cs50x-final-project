    {% extends "layout.html" %}
{% block content %}
<form action="/request" method="post">
  <label>Occasion
    <input name="occasion" type="text" placeholder="Wedding, birthday, memorial..." required>
  </label>
  <label>Tone
    <select name="tone" required>
      <option value="warm">Warm</option>
      <option value="romantic">Romantic</option>
      <option value="hopeful">Hopeful</option>
      <option value="reflective">Reflective</option>
    </select>
  </label>
  <label>For who?
    <input name="subject" type="text" placeholder="My partner, my friend, my cat ;)" required>
  </label>
  <label>Key memory or detail
    <textarea name="detail" rows="3" placeholder="A moment, phrase, or image to include" required></textarea>
  </label>
  <label>Budget (€)
    <input name="budget" type="number" min="5" max="500" step="1" value="5" required>
  </label>
  <label>Delivery region
    <select name="region" required>
      <option value="europe" selected>Europe</option>
      <option value="outside-europe">Outside Europe</option>
    </select>
  </label>
  <label class="checkbox-row">
    <input name="paperCopy" type="checkbox" value="yes">
    Send poem on paper (+€12)
  </label>
  <div class="form-note">Paper delivery is available only for requests in Europe.</div>
  <button type="submit">Submit request</button>
</form>
{% endblock %}
